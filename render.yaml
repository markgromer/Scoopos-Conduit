# Render.com Blueprint - https://render.com/docs/blueprint-spec
# Deploy: connect your repo and Render auto-detects this file.

databases:
  - name: conduit-db
    plan: basic-256mb
    databaseName: conduit
    user: conduit

services:
  # ── API + Frontend (single web service) ──
  - type: web
    name: conduit-api
    runtime: python
    plan: starter
    buildCommand: ./scripts/render-build.sh
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conduit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: conduit-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        value: conduit-verify-token
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: FRONTEND_URL
        value: ""
      - key: CORS_ORIGINS
        value: '["*"]'

  # ── Celery Worker ──
  - type: worker
    name: conduit-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A backend.workers.tasks.celery_app worker -l info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conduit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: conduit-redis
          type: keyvalue
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.3"

  # ── Redis ──
  - type: keyvalue
    name: conduit-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
